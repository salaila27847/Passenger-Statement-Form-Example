<div class="section-flight-details">
    <div class="form-row">
        <div class="form-item" style="flex-grow: 2;">
            <label data-translate-key="arrivalFlightDetails">6. Arrival Flight Details</label>
        </div>
        <div class="form-item">
            <label data-translate-key="flightDate">Date</label>
            <input type="text" id="arrivalDate" class="underline-input" style="width: 100px;" value="15/07/2025">
        </div>
        <div class="form-item">
            <label data-translate-key="pnr">PNR:</label>
            <input type="text" id="arrivalPnr" class="underline-input" style="width: 80px;" value="AB12D3">
        </div>
    </div>
    <div class="flight-details-grid">
        <div class="grid-item"><label data-translate-key="departedFrom">&nbsp;&nbsp;&nbsp;Departed from</label></div>
        <div class="grid-item"><input type="text" id="arrivingFrom" class="underline-input" value="Bali / DPS"></div>
        <div class="grid-item"><label data-translate-key="flightNo">Flight No.</label></div>
        <div class="grid-item"><input type="text" id="arrivalFlightNo" class="underline-input" value="TG123"></div>
    </div>

    <div class="form-row" style="margin-top: 15px;">
        <div class="form-item" style="flex-grow: 2;">
            <label data-translate-key="departureFlightDetails">7. Departure Flight Details</label>
        </div>
        <div class="form-item">
            <label data-translate-key="flightDate">Date</label>
            <input type="text" id="departureDate" class="underline-input" style="width: 100px;" value="25/07/2025">
        </div>
        <div class="form-item">
            <label data-translate-key="pnr">PNR:</label>
            <input type="text" id="departurePnr" class="underline-input" style="width: 80px;" value="F13H45">
        </div>
    </div>
    <div class="flight-details-grid">
        <div class="grid-item"><label data-translate-key="arriveAt">&nbsp;&nbsp;&nbsp;Arrive at</label></div>
        <div class="grid-item"><input type="text" id="departingAt" class="underline-input" value="Beijing / PEK"></div>
        <div class="grid-item"><label data-translate-key="flightNo">Flight No.</label></div>
        <div class="grid-item"><input type="text" id="departureFlightNo" class="underline-input" value="CA123"></div>
    </div>
</div>
